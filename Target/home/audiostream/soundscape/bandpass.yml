devices:
  samplerate: 48000
  # For streaming stability, err on the side of larger chunks/buffers.
  # 2048 @ 48 kHz is ~43 ms per chunk and is typically much more robust.
  chunksize: 2048

  # When enable_rate_adjust is true, target_level controls how much audio
  # should be left in the playback buffer when the next chunk arrives.
  target_level: 1536

  # React faster to drift (seconds between corrections).
  adjust_period: 3

  # Needed for continuous rate-matching when capture/playback clocks are
  # independent (common with real ADC capture + ALSA Loopback playback).
  resampler:
    type: AsyncSinc
    profile: Balanced
  enable_rate_adjust: true
  capture:
    type: Alsa
    channels: 2
    device: "hw:2,0"
    format: S16LE
  playback:
    type: Alsa # File
    channels: 2
    device: "hw:Loopback,0,0"
    format:  S16LE
    # filename: "/tmp/audio_pipe"

filters:
  input_gain:
    type: Gain
    parameters:
      gain: 0.0  # 20: mic, 10-20: guitar, 0: line input

  hp1:
    type: Biquad
    parameters:
      type: Highpass
      freq: 300.0
      q: 0.707

  hp2:
    type: Biquad
    parameters:
      type: Highpass
      freq: 300.0
      q: 0.707

  lp1:
    type: Biquad
    parameters:
      type: Lowpass
      freq: 13000.0
      q: 0.707

  lp2:
    type: Biquad
    parameters:
      type: Lowpass
      freq: 13000.0
      q: 0.707

pipeline:
  - type: Filter
    names: [input_gain]
    channels: [0, 1]

  - type: Filter
    names: [hp1, hp2, lp1, lp2]
    channels: [0, 1]
