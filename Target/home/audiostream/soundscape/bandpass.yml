devices:
  samplerate: 48000
  # 48 kHz recommended starting point is 1024 (≈21 ms) and is typically
  # much less prone to ALSA xruns than 512 on busy/embedded systems.
  chunksize: 1024
  # When enable_rate_adjust is true, target_level controls how much audio
  # should be left in the playback buffer when the next chunk arrives.
  # Keeping some headroom reduces underruns.
  target_level: 768
  enable_rate_adjust: true
  capture:
    type: Alsa
    channels: 2
    device: "hw:2,0"
    format: S16LE
  playback:
    type: Alsa # File
    channels: 2
    device: "hw:Loopback,0,0"
    format:  S16LE
    # filename: "/tmp/audio_pipe"

filters:
  input_gain:
    type: Gain
    parameters:
      gain: 0.0  # 20: mic, 10-20: guitar, 0: line input

  hp1:
    type: Biquad
    parameters:
      type: Highpass
      freq: 300.0
      q: 0.707

  hp2:
    type: Biquad
    parameters:
      type: Highpass
      freq: 300.0
      q: 0.707

  lp1:
    type: Biquad
    parameters:
      type: Lowpass
      freq: 13000.0
      q: 0.707

  lp2:
    type: Biquad
    parameters:
      type: Lowpass
      freq: 13000.0
      q: 0.707

pipeline:
  - type: Filter
    names: [input_gain]
    channels: [0, 1]

  - type: Filter
    names: [hp1, hp2, lp1, lp2]
    channels: [0, 1]
